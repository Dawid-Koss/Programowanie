<script>
function choinka(n){
    var pietro = 1;
    for (var i = 0; i < n; i++){
        poziom =""
        for(var j = 1; j<=(n*2-1-pietro)/2;j++){
            poziom += " ";
        }
        for(var j = 1; j<=pietro;j++){
            poziom += "*";
        }
        console.log(poziom)
        pietro +=2;
    }
    for(var i = 0; i<2; i++){
        poziom = "";
        for(var j = 1; j<=(n*2-1-3)/2;j++){
            poziom += " ";
        }
        poziom += "***";
        console.log(poziom)
    }
}

choinka(2); //to jest wywołanie funkcji
</script>
