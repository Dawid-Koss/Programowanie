<html>
<head>
    <meta charset="utf-8">
    <style>
        #reset {display:inline-block;}
        #stop {display:none;}
        #reset {display:none}
    </style>
</head>
<body>
    <h1 id="czas">
    <span id="godziny">00</span>:<span id="minuty">00</span>:<span id="sekundy">00</span>
    </h1>
    <button id = "start" onclick="startt()">START</button>
    <button id = "zapisz" onclick="zap()">ZAPISZ</button>
    <button id = "stop" onclick="stopp()">STOP</button>
    <button id = "reset" onclick="resett()">RESET</button>
    <p id = "stan_stopera"></p>
    <ul id = "zapisane_czasy">
    </ul>
    <script>
        var lista = document.getElementById("zapisane_czasy")
        var godzina = 0;
        var minuta = 0;
        var sekunda = 0;
        var uruchomiony = true;

        function startt(){
            uruchomiony = true;
            intewral = setInterval(zm,1000);
            document.getElementById("start").style.display ="none";
            document.getElementById("stop").style.display ="inline-block";
            document.getElementById("reset").style.display ="none";
            document.getElementById("stan_stopera").innerHTML = "Odliczanie..."
            document.getElementById("reset").style.display ="inline-block";
        }
        function resett(){
            if(uruchomiony){
                clearInterval(intewral);
                    intewral = setInterval(zm,1000);
            }
            godzina = 0;
            minuta = 0;
            sekunda = 0;
            pokaz()
            document.getElementById("zapisane_czasy").innerHTML = ""
            document.getElementById("stan_stopera").innerHTML = ""
            document.getElementById("reset").style.display ="none";
        }
        function zm(){
            sekunda += 1
            if (sekunda == 60){
                sekunda = 0;
                minuta += 1;
            }
            if (minuta == 60){
                minuta = 0;
                godzina += 1;
            }
            pokaz();
        }
        function pokaz(){
            if (godzina < 10){
                document.getElementById("godziny").innerHTML = "0"+godzina;
            }else{
                document.getElementById("godziny").innerHTML = godzina;
            }
            if (minuta < 10){
                document.getElementById("minuty").innerHTML = "0"+minuta;
            }else{
                document.getElementById("minuty").innerHTML = minuta;
            }
            if (sekunda < 10){
                document.getElementById("sekundy").innerHTML = "0"+sekunda;
            }else{
                document.getElementById("sekundy").innerHTML = sekunda;
            }
        }
        function stopp(){
            uruchomiony = false;
            clearInterval(intewral);
            document.getElementById("start").style.display ="inline-block";
            document.getElementById("stop").style.display ="none";
            document.getElementById("reset").style.display ="inline-block";
            document.getElementById("stan_stopera").innerHTML = "Wstrzymano"
            document.getElementById("reset").style.display ="inline-block";
        }
        function zap(){
            var pom = 0;
            if (godzina < 10){
                pom = "0"+godzina;
            }else{
                pom = godzina;
            }
            if (minuta < 10){
                pom += ":0"+minuta;
            }else{
                pom += ":"+minuta;
            }
            if (sekunda < 10){
                pom += ":0"+sekunda;
            }else{
                pom += ":"+sekunda;
            }
            var node = document.createElement("li");
            var textnode = document.createTextNode(pom);
            node.append(textnode);
            document.getElementById("zapisane_czasy").appendChild(node);
        }
    </script>
</body>
</html>
