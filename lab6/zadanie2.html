<html>
<head>
    <meta charset="utf-8">
    <style>
        #reset {display:inline-block;}
        #stop {display:none;}
    </style>
</head>
<body>
    <h1 id="czas">
    <span id="godziny">00</span>:<span id="minuty">00</span>:<span id="sekundy">00</span>
    </h1>
    <button id = "start" onclick="startt()">START</button>
    <button id = "zapisz" onclick="zap()">ZAPISZ</button>
    <button id = "stop" onclick="stopp()">STOP</button>
    <button id = "reset" onclick="resett()">RESET</button>
    <p id = "stan_stopera"></p>
    <ul id = "zapisane_czasy">
    </ul>
    <script>
        var lista = document.getElementById("zapisane_czasy")
        var godzina = 0;
        var minuta = 0;
        var sekunda = 0;

        function startt(){
            intewral = setInterval(zm,1000);
            document.getElementById("start").style.display ="none";
            document.getElementById("stop").style.display ="inline-block";
        }
        function resett(){
            godzina = 0;
            minuta = 0;
            sekunda = 0;
            pokaz()
        }
        function zm(){
            sekunda += 1
            if (sekunda == 60){
                sekunda = 0;
                minuta += 1;
            }
            if (minuta == 60){
                minuta = 0;
                godzina += 1;
            }
            pokaz();
        }
        function pokaz(){
            if (godzina < 10){
                document.getElementById("godziny").innerHTML = "0"+godzina;
            }else{
                document.getElementById("godziny").innerHTML = godzina;
            }
            if (minuta < 10){
                document.getElementById("minuty").innerHTML = "0"+minuta;
            }else{
                document.getElementById("minuty").innerHTML = minuta;
            }
            if (sekunda < 10){
                document.getElementById("sekundy").innerHTML = "0"+sekunda;
            }else{
                document.getElementById("sekundy").innerHTML = sekunda;
            }
        }
        function stopp(){
            clearInterval(intewral);
            document.getElementById("start").style.display ="none";
            document.getElementById("stop").style.display ="inline-block";
        }
        function zap(){

        }
    </script>
</body>
</html>
