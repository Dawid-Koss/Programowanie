<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 id="czas">
        <span id="dzien">00</span>.<span id="miesiac">00</span>.<span id="rok">0000</span><br>
        <span id="godzina">00</span>:<span id="minuty">00</span>:<span id="sekundy">00</span>

    </h1>
    <button id="pobierz" onclick="pobierz()">Pobierz</button>
    <script>
        async function pobierz(){  
            const odp = await fetch("https://timeapi.io/api/time/current/zone?timeZone=Europe/Warsaw")
            const dane = await odp.json()
            document.getElementById("godzina").innerHTML = dane.hour
            document.getElementById("minuty").innerHTML = dane.minute
            document.getElementById("sekundy").innerHTML = dane.seconds
            document.getElementById("dzien").innerHTML = dane.day
            document.getElementById("miesiac").innerHTML = dane.month
            document.getElementById("rok").innerHTML = dane.year
        }
    </script>
    
</body>
</html>
