<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clicker</title>
</head>

<body>
    <h1 id="wynik">0</h1>
    <button id="klik">Kliknij mnie!</button>
    <p id="m_klik_label">Moc Kliknięcia = <span id="m_klik">1</span></p>
    <button id="ulepsz_m_klik">Moc klikniecia (<span id="m_klik_cena">0</span>)</button>
    <p id="p_klik_label">Pasywne klikniecia= <span id="p_klik">0</span></p>
    <button id="ulepsz_p_klik">Pasywne klikniecie (<span id="p_klik_cena">0</span>)</button>
</body>

</html>
<script>
    var wynik_label = document.getElementById("wynik");
    var klik_przycisk = document.getElementById("klik");
    var m_klik_przycisk = document.getElementById("ulepsz_m_klik")
    var p_klik_przycisk = document.getElementById("ulepsz_p_klik")

    var m_klik_label = document.getElementById("m_klik_label")
    var p_klik_label = document.getElementById("p_klik_label")

    var m_klik_wartosc = document.getElementById("m_klik")
    var p_klik_wartosc = document.getElementById("p_klik")

    var m_klik_cena = document.getElementById("m_klik_cena")
    var p_klik_cena = document.getElementById("p_klik_cena")

    function aktu() {
        let wynik = localStorage.getItem("wynik")
        let m_klik = localStorage.getItem("m_klik")
        let p_klik = localStorage.getItem("p_klik")
        wynik_label.innerHTML = wynik
        m_klik_wartosc.innerHTML = m_klik
        p_klik_wartosc.innerHTML = p_klik

        let m_klik_c = Math.round(25*(1.3**parseInt(m_klik)))
        let p_klik_c = Math.round(25*(1.6**parseInt(p_klik)))
        m_klik_cena.innerHTML = m_klik_c
        p_klik_cena.innerHTML = p_klik_c
    }
    function dodajPunkty(x) {
        let wynik = parseInt(localStorage.getItem("wynik"))
        localStorage.setItem("wynik", wynik + x)
        aktu()
    }
    window.onload = _ => {
        let wynik = localStorage.getItem("wynik")
        let m_klik = localStorage.getItem("m_klik")
        let p_klik = localStorage.getItem("p_klik")
        let data = localStorage.getItem("data")
        if (!wynik) {
            localStorage.setItem("wynik", 0)
        }
        if (!m_klik) {
            localStorage.setItem("m_klik", 1)
        }
        if (!p_klik) {
            localStorage.setItem("p_klik", 0)
        }
        if (!data) {
            localStorage.setItem("data", new Date())
        }else{
            let current_date = new Date()
            localStorage.setItem("data", current_date)
            let last_date = new Date(data)
            let diff = Math.floor((current_date - last_date)/1000)
            dodajPunkty(diff * parseInt(p_klik))
        }
        const pasywnyPrzyrost = _ =>
        {
            let p_klik = parseInt(localStorage.getItem("p_klik"))
            dodajPunkty(p_klik);
            localStorage.setItem("data", new Date())
        }        
        setInterval(pasywnyPrzyrost, 1000)
        aktu()
    }
    klik_przycisk.onclick = _ => {
        let m_klik = parseInt(localStorage.getItem("m_klik"))
        dodajPunkty(m_klik);
    }
    m_klik_przycisk.onclick = _ =>
    {
        let wynik = parseInt(localStorage.getItem("wynik"))
        let m_klik = parseInt(localStorage.getItem("m_klik"))
        let cena = Math.round(25*(1.3**parseInt(m_klik)))
        if (wynik >= cena){
            wynik = wynik - cena
            m_klik = m_klik + 1
            localStorage.setItem("m_klik", m_klik)
            dodajPunkty(-cena)
        }
    }
    p_klik_przycisk.onclick = _ =>
    {
        let wynik = parseInt(localStorage.getItem("wynik"))
        let p_klik = parseInt(localStorage.getItem("p_klik"))
        let cena = Math.round(25*(1.6**parseInt(p_klik)))
        if (wynik >= cena){
            wynik = wynik - cena
            p_klik = p_klik + 1
            localStorage.setItem("p_klik", p_klik)
            dodajPunkty(-cena)
        }
    }
</script>
